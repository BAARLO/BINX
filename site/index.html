<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#002868">
  <title>WK 2026 Poule</title>
  <link rel="stylesheet" href="style.mobile.fixed.css">
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <div class="toggle" role="tablist" aria-label="Weergave switch">
        <button class="toggle-btn active" data-view="matches" type="button">Wedstrijden</button>
        <button class="toggle-btn" data-view="bonus" type="button">Bonusvragen</button>
      </div>
    </div>

    <div class="app-shell">
      <main class="content-pane">
        <section id="matchesView" class="view active-view">
          <div id="matchesContainer" class="cards-groups"></div>
        </section>

        <section id="bonusView" class="view">
          <div id="bonusContainer" class="cards-groups"></div>
        </section>
      </main>

      <aside class="stand-pane">
        <section class="stand-panel">
          <div class="bar red">Stand</div>
          <div class="table-wrap stand-wrap">
            <table class="stand-table" id="standTable">
              <thead>
                <tr>
                  <th>Rang</th>
                  <th>Deelnemer</th>
                  <th>Wedstr.</th>
                  <th>Bonus</th>
                  <th>Totaal</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.mobile.fixed.js"></script>
</body>
</html>
